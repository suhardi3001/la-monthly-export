<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Service Management Search Results</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }
        th {
            background-color: #4CAF50;
        }
        tr:hover, td:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>IT Service Management Search Results</h1>
    
    <!-- Search Form -->
    <form action="https://1gfmassupport.anm.gov.my/helpdesk" method="GET">
        <input type="hidden" name="_foreach_" value="as=None" />
        
        <div style="margin-bottom: 10px;">
            <label for="createdBy">Created By ID:</label>
            <input type="text" id="createdBy" name="searchBy_createdBy" placeholder="Enter ID 810130065369">
        </div>
        
        <div style="margin-bottom: 10px;">
            <label for="assignedTo">Assigned To ID:</label>
            <input type="text" id="assignedTo" name="searchBy_assignedTo" placeholder="Enter ID 810130065369">
        </div>
        
        <button type="submit">Search</button>
    </form>

    <!-- Results Display -->
    <table width="100%" style="margin-top: 20px;">
        <thead>
            <tr>
                <th>Incident Number</th>
                <th.Created By></th>
                <th.Aigned To></th>
                <th>Status</th>
                <th.Count</th>
            </tr>
        </thead>
        
        <tbody id="resultsBody">
            <!-- Results will be inserted here -->
        </tbody>
    </table>

    <!-- Pagination Controls -->
    <div style="margin-top: 20px; margin-bottom: 20px;">
        <button onclick="previousPage()" style="display: inline-block;">Previous</button>
        <span id="currentPage">Page 1</span>
        <button onclick="nextPage()" style="display: inline-block;">Next</button>
    </div>

    <script>
        // Placeholder for download functionality
        function downloadExcel() {
            alert('Results exported to Excel format.');
        }

        // Current page display
        document.getElementById('currentPage').innerHTML = `Page ${document.getElementById('currentPage').value}`;

        // Previous page
        function nextPage() {
            if (this.innerHTML.includes('Previous')) {
                this.innerHTML = 'Next';
                window.location.href = `https://1gfmassupport.anm.gov.my/helpdesk?_ sort_by created_at&start=${{#queryParams|default:0}}&_ per_page=25";
            }
        }

        function previousPage() {
            if (this.innerHTML.includes('Next')) {
                this.innerHTML = 'Previous';
                window.location.href = `https://1gfmassupport.anm.gov.my/helpdesk?_ sort_by created_at&start=${{#queryParams|default:0}}&_ per_page=25";
            }
        }

        // Note: The actual search and result fetching logic needs to be implemented in a backend server
    </script>

</body>
</html>
